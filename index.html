<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gersang Tools</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #020617, #0f172a);
    }
    .wrap {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }
    .hero {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.92);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .tabs {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.96);
    }
    .tab {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
    }
    .panes {
      position: relative;
      min-height: 0;
    }
    .pane {
      position: absolute;
      inset: 0;
      display: none;
      background: var(--bg);
    }
    .pane.active {
      display: block;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
    .hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      align-self: center;
    }
    @media (max-width: 720px) {
      .tabs { flex-wrap: wrap; }
      .hint { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Gersang Tools</h1>
      <p>One page for quest search and translation lookup.</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-pane="quests">Quest Search</button>
      <button class="tab" data-pane="translations">Translations</button>
      <div class="hint">Both tools are loaded from the local HTML files in this folder.</div>
    </div>

    <div class="panes">
      <section class="pane active" id="pane-quests">
        <iframe src="./quest_search.html" title="Quest Search"></iframe>
      </section>
      <section class="pane" id="pane-translations">
        <iframe src="./translations.html" title="Translations"></iframe>
      </section>
    </div>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const panes = {
      quests: document.getElementById('pane-quests'),
      translations: document.getElementById('pane-translations'),
    };

    function setActivePane(name) {
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.pane === name));
      Object.entries(panes).forEach(([key, pane]) => {
        pane.classList.toggle('active', key === name);
      });
      const url = new URL(window.location.href);
      url.searchParams.set('tab', name);
      history.replaceState(null, '', url);
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => setActivePane(tab.dataset.pane));
    });

    const initialTab = new URLSearchParams(window.location.search).get('tab');
    if (initialTab && panes[initialTab]) {
      setActivePane(initialTab);
    }
  </script>
</body>
</html>
